apiVersion: v1
data:
  mimir.yaml: |
    multitenancy_enabled: false
    server:
      http_listen_port: 8080
      grpc_listen_port: 9095
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir
    memberlist:
      join_members:
        - mimir-gossip:7946
    ingester:
      ring:
        replication_factor: 1
        kvstore:
          store: memberlist
    distributor:
      ring:
        kvstore:
          store: memberlist
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
      tsdb:
        dir: /data/mimir/tsdb
    compactor:
      data_dir: /data/mimir/compactor
    store_gateway:
      sharding_ring:
        replication_factor: 1
    limits:
      max_global_series_per_user: 0
      ingestion_rate: 100000
      ingestion_burst_size: 200000
kind: ConfigMap
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"v1","data":{"mimir.yaml":"multitenancy_enabled: false\nserver:\n  http_listen_port: 8080\n  grpc_listen_port: 9095\ncommon:\n  storage:\n    backend: filesystem\n    filesystem:\n      dir: /data/mimir\nmemberlist:\n  join_members:\n    - mimir-gossip:7946\ningester:\n  ring:\n    replication_factor: 1\n    kvstore:\n      store: memberlist\ndistributor:\n  ring:\n    kvstore:\n      store: memberlist\nblocks_storage:\n  backend: filesystem\n  filesystem:\n    dir: /data/mimir/blocks\n  tsdb:\n    dir: /data/mimir/tsdb\ncompactor:\n  data_dir: /data/mimir/compactor\nstore_gateway:\n  sharding_ring:\n    replication_factor: 1\nlimits:\n  max_global_series_per_user: 0\n  ingestion_rate: 100000\n  ingestion_burst_size: 200000\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"mimir-config","namespace":"ebpf-repro"}}
