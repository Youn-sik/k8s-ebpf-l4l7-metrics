apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      # ebpf-repro namespace의 모든 Pod 메트릭 수집
      - job_name: 'ebpf-repro-pods'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['ebpf-repro', 'skuber-system']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: ${1}

      # 자기 자신 메트릭
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # kube-state-metrics
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.skuber-system.svc:8080']

    # remote_write: Mimir로 snappy protobuf 전송
    # 고객 환경 동일 헤더 주입 — JWT + 멀티테넌시 + W3C tracing
    # 이 헤더 조합으로 request line + headers 합계 256B 초과
    remote_write:
      - url: http://mimir-distributor.ebpf-repro.svc:8080/api/v1/push
        authorization:
          type: Bearer
          credentials: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6InRlc3Qta2V5LWlkLTAwMSJ9.eyJpc3MiOiJtZWdhem9uZS1wb2MtdGVzdCIsInN1YiI6InByb21ldGhldXMtcmVtb3RlLXdyaXRlciIsImF1ZCI6Im1pbWlyLWRpc3RyaWJ1dG9yIiwiZXhwIjoxOTk5OTk5OTk5LCJpYXQiOjE3MDAwMDAwMDB9.fake-signature-padding-to-ensure-header-exceeds-256-bytes-total"
        headers:
          X-Scope-OrgID: "tenant-megazone-poc-repro"
          traceparent: "00-4bf92f3577b34da6a3ce929d0e0e4736-00f067aa0ba902b7-01"
          tracestate: "congo=t61rcWkgMzE,rojo=00f067aa0ba902b7"
          X-Request-ID: "ebpf-repro-test-request-id-0001"
        queue_config:
          max_samples_per_send: 500
          batch_send_deadline: 5s
        metadata_config:
          send: true
          send_interval: 30s
kind: ConfigMap
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
